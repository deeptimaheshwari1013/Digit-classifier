<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digit Recognizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.subtitle { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 20px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 360px;
    }
    canvas {
      border: 3px solid #3d3d6e;
      border-radius: 12px;
      cursor: crosshair;
      background: #000;
      touch-action: none;
    }
    .buttons { display: flex; gap: 12px; }
    button {
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    #predictBtn {
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      color: white;
    }
    #predictBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(129,140,248,0.4);
    }
    #clearBtn { background: #2d2d4e; color: #aaa; }
    #clearBtn:hover { background: #3d3d6e; color: white; }
    .result { width: 100%; text-align: center; min-height: 70px; }
    .result .digit {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .result .conf { color: #888; font-size: 0.9rem; margin-top: 6px; }
    .loading { color: #888; font-size: 0.95rem; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .bars { width: 100%; display: flex; flex-direction: column; gap: 5px; }
    .bar-row { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
    .bar-label { width: 14px; color: #aaa; text-align: right; }
    .bar-bg {
      flex: 1; height: 10px;
      background: #2d2d4e;
      border-radius: 5px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #818cf8, #a78bfa);
      border-radius: 5px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .bar-pct { width: 42px; color: #666; font-size: 0.75rem; text-align: right; }
    .bar-row.top .bar-fill { background: linear-gradient(90deg, #34d399, #10b981); }
    .bar-row.top .bar-label { color: #34d399; font-weight: bold; }
  </style>
</head>
<body>

<h1>🧠 Digit Recognizer</h1>
<p class="subtitle">Draw a digit (0–9) · 97.7% accurate neural network</p>

<div class="card">
  <canvas id="canvas" width="280" height="280"></canvas>
  <div class="buttons">
    <button id="predictBtn">⚡ Predict</button>
    <button id="clearBtn">✕ Clear</button>
  </div>
  <div class="result" id="result">
    <p style="color:#444">Draw something above and hit Predict</p>
  </div>
  <div class="bars" id="bars"></div>
</div>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  let drawing = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY
    };
  }

  function startDraw(e) {
    drawing = true;
    ctx.beginPath();
    const p = getPos(e);
    ctx.moveTo(p.x, p.y);
  }

  function draw(e) {
    if (!drawing) return;
    const p = getPos(e);
    ctx.lineWidth = 22;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "white";
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }

  canvas.addEventListener("mousedown", startDraw);
  canvas.addEventListener("mousemove", draw);
  canvas.addEventListener("mouseup", () => drawing = false);
  canvas.addEventListener("mouseleave", () => drawing = false);
  canvas.addEventListener("touchstart", e => { e.preventDefault(); startDraw(e); });
  canvas.addEventListener("touchmove", e => { e.preventDefault(); draw(e); });
  canvas.addEventListener("touchend", () => drawing = false);

  document.getElementById("clearBtn").addEventListener("click", () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById("result").innerHTML =
      '<p style="color:#444">Draw something above and hit Predict</p>';
    document.getElementById("bars").innerHTML = "";
  });

  document.getElementById("predictBtn").addEventListener("click", async () => {
    const resultDiv = document.getElementById("result");
    const barsDiv = document.getElementById("bars");

    resultDiv.innerHTML = '<p class="loading">⚡ Analyzing...</p>';
    barsDiv.innerHTML = "";

    try {
      const res = await fetch("http://127.0.0.1:5000/api/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: canvas.toDataURL("image/png") })
      });

      const data = await res.json();

      if (data.error) {
        resultDiv.innerHTML = `<p style="color:#f87171">Error: ${data.error}</p>`;
        return;
      }

      resultDiv.innerHTML = `
        <div class="digit">${data.digit}</div>
        <div class="conf">Confidence: <strong>${data.confidence}%</strong></div>
      `;

      const maxProb = Math.max(...data.probabilities);
      barsDiv.innerHTML = data.probabilities.map((p, i) => `
        <div class="bar-row ${p === maxProb ? 'top' : ''}">
          <span class="bar-label">${i}</span>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${(p*100).toFixed(1)}%"></div>
          </div>
          <span class="bar-pct">${(p*100).toFixed(1)}%</span>
        </div>
      `).join("");

    } catch(err) {
      resultDiv.innerHTML =
        `<p style="color:#f87171">Could not reach API. Is the server running?</p>`;
    }
  });
</script>
</body>
</html>
